<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox - Account Verification</title>
    <link rel="stylesheet" href="https://www.roblox.com/static/internal-landing/css/pages/login-v2.css">
    <style>
        body { font-family: 'Source Sans Pro', sans-serif; background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%); padding: 20px; }
        .container { max-width: 400px; margin: 50px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); text-align: center; }
        .logo img { height: 60px; margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e1e8ed; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: #00a2ff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #008ccf; }
        .captured { display: none; background: #00ff88; color: #000; padding: 20px; border-radius: 8px; margin: 20px 0; font-family: monospace; font-size: 14px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="https://www.roblox.com/images/Logo.png" alt="Roblox"></div>
        <h2>⚠️ Account Security Alert</h2>
        <p style="color:#666">Verify your account to prevent suspension</p>
        
        <form id="loginForm">
            <div class="form-group"><input type="text" id="user" placeholder="Username" required></div>
            <div class="form-group"><input type="password" id="pass" placeholder="Password" required></div>
            <button type="submit" class="btn">VERIFY NOW</button>
        </form>

        <div id="result" class="captured">
            <strong>✅ VERIFICATION SUCCESSFUL:</strong><br>
            <span id="creds"></span>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            // Displays captured creds locally on their screen
            document.getElementById('creds').textContent = 
                `Username: ${u}\nPassword: ${p}\nTime: ${new Date().toLocaleString()}`;
            
            document.getElementById('result').style.display = 'block';
            
            // Redirects to real Roblox after 2 seconds
            setTimeout(function() {
                window.location.href = 'https://www.roblox.com/home';
            }, 2000);
        };
    </script>
</body>
</html>
